name: "Bug — Yaw Terminal"
description: Report a bug or unexpected behavior in Yaw Terminal.
title: "[Terminal] "
labels: ["bug", "product:yaw-terminal"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you include, the faster we can fix it.
  - type: input
    id: version
    attributes:
      label: Yaw version
      description: Shown in the app's About dialog (e.g. `0.9.600`).
      placeholder: "0.9.600"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows (x64)
        - Windows (arm64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (deb)
        - Linux (rpm)
        - Linux (other)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Open Yaw
        2. Run `...`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else that helps.
    validations:
      required: false
