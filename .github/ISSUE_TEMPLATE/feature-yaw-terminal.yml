name: "Feature — Yaw Terminal"
description: Suggest a feature or improvement for Yaw Terminal.
title: "[Terminal] "
labels: ["enhancement", "product:yaw-terminal"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! A short description of the problem you're trying to solve is often more useful than a fully designed feature.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What are you trying to do, and what's getting in the way today?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested solution
      description: If you have an idea for how this could work, describe it here.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to similar features in other tools, etc.
    validations:
      required: false
